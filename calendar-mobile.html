              content: testi_oroscopo[9],
            },
            {
              title: "Scorpione (24 ottobre - 22 novembre)",
              content: testi_oroscopo[10],
            },
          ],
          11: [
            {
              title: "Scorpione (24 ottobre - 22 novembre)",
              content: testi_oroscopo[10],
            },
            {
              title: "Sagittario (23 novembre - 21 dicembre)",
              content: testi_oroscopo[11],
            },
          ],
          12: [
            {
              title: "Sagittario (23 novembre - 21 dicembre)",
              content: testi_oroscopo[11],
            },
            {
              title: "Capricorno (22 dicembre -  gennaio)",
              content: testi_oroscopo[0],
            },
          ],
        };

        function generaSlide() {
          for (let month = 1; month <= 12; month++) {
            const slideHtml = `
                                <div class="swiper-slide slide${month}">
                                  <div class="overlay"></div>
                                  <div class="container position-relative">
                                    <div class="row d-flex text-center align-items-center my-3 header mx-1 px-2">
                                      <div class="col-3 text-start year mx-0 px-0" style="transform: scaleY(1.8)">'26</div>
                                      <div class="col-6 text-center border border-dark month-name h-100 d-flex align-items-center justify-content-center px-3">
                                        <span class="mt-3">${nomiMesi[month]}</span>
                                      </div>
                                      <div class="col-3 text-end mx-0 px-0">
                                        <img class="logo" src="./img/Logo_TN2G.png" alt="Logo TN2G">
                                      </div>
                                    </div>
                                    <div class="row content-calendar">
                                      <div class="col-12">
                                        <div class="calendar calendar_${dictMesi[month]}"></div>
                                      </div>
                                    </div>
                                    <div class="col-12 border border-dark p-3 oroscopo text-center">
                                      <div class="col-12">
                                        <h3 class="title text-uppercase mt-3 mb-4">L'oroscopo di Diana Onirisis</h3>
                                        <div class="row">
                                          <div class="col-12 col-md-6">
                                            <h4 class="oroscopo-title text-uppercase">${oroscopo[month][0]["title"]}</h4>
                                            <p class="oroscopo-text px-2 text-uppercase">${oroscopo[month][0]["content"]}</p>
                                          </div>
                                          <div class="col-12 col-md-6 mt-md-0 mt-5">
                                            <h4 class="oroscopo-title text-uppercase">${oroscopo[month][1]["title"]}</h4>
                                            <p class="oroscopo-text px-2 text-uppercase">${oroscopo[month][1]["content"]}</p>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              `;
            $(".swiper-wrapper").append(slideHtml);
          }
        }

        function generaGriglia() {
          for (let month = 1; month <= 12; month++) {
            // Per ogni mese
            var calendario = $(".calendar_" + dictMesi[month]);
            var swiper = $(".slide" + month);
            swiper.css(
              "background",
              "url('img/bgs/" +
                month +
                ".jpg') center center / cover no-repeat",
            );
            calendario.empty();

            const totaleCelle = 35; // 5 righe * 7 colonne
            const giorni = giorniPerMese[month]; // Giorni nel mese

            for (let giorno = 1; giorno <= totaleCelle; giorno++) {
              // ciclo per ogni giorno e creo box con contenuto

              let compleanniGiorno = compleanni[month].filter(
                (c) => c.day === giorno,
              );
              if (giorno <= giorni) {
                // Giorno <= 31, 30 o 28
                calendario.append(`
                                      <div class="day position-relative">
                                          <div class='day-number position-absolute top-0 end-0 '>${giorno}</div>
                                          <div class="day-content d-flex  w-100 h-100 align-items-center justify-content-center">
                                              ${compleanniGiorno.map((c) => `<div class="d-flex flex-column align-items-center mx-2"><span class="celebrated-name text-center">${c.name}</span> <span class="age">${c.eta}</span></div>`).join("⋄")}
                                          </div>
                                      </div>
                                  `);
              } else {
                calendario.append(`
                                      <div class="day empty"></div>
                                  `);
              }
            }

            // Intestazione
            $.each(giorni, function (_, giorno) {
              calendario.append(`<div class="day-name">${giorno}</div>`);
            });
          }
        }

        generaSlide();
        generaGriglia();

        const swiper = new Swiper(".swiper", {
          // Optional parameters
          direction: "horizontal",
          loop: false,

          // If we need pagination
          pagination: {
            el: ".swiper-pagination",
          },

          // Navigation arrows
          navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
          },

          // And if we need scrollbar
          scrollbar: {
            el: ".swiper-scrollbar",
          },
        });
      });
    </script>
  </body>
</html>
