                                        <h2>${nomiMesi[month]}</h2>
                                      </div>
                                      <div class="col-3 text-end">
                                        <img class="logo" src="./img/Logo_TN2G.png" alt="Logo TN2G">
                                      </div>
                                    </div>
                                    <div class="row content-calendar">
                                      <div class="col-12">
                                        <div class="calendar calendar_${dictMesi[month]}"></div>
                                      </div>
                                    </div>
                                    <div class="row border border-dark p-3 oroscopo text-center">
                                      <div class="col-12">
                                        <h3 class="title text-uppercase mt-3 mb-4">L'oroscopo di Diana Onirisis</h3>
                                        <div class="oroscopo row">
                                          <div class="col-12 col-md-6">
                                            <h4 class="oroscopo-title">${oroscopo[month][0]["title"]}</h4>
                                            <p class="oroscopo-text">${oroscopo[month][0]["content"]}</p>
                                          </div>
                                          <div class="col-12 col-md-6">
                                            <h4 class="oroscopo-title">${oroscopo[month][1]["title"]}</h4>
                                            <p class="oroscopo-text">${oroscopo[month][1]["content"]}</p>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              `;
            $(".swiper-wrapper").append(slideHtml);
          }
        }

        function generaGriglia() {
          for (let month = 1; month <= 12; month++) {
            // Per ogni mese
            var calendario = $(".calendar_" + dictMesi[month]);
            var swiper = $(".slide" + month);
            swiper.css(
              "background",
              "url('img/bgs/" +
                month +
                ".jpg') center center / cover no-repeat",
            );
            calendario.empty();

            const totaleCelle = 35; // 5 righe * 7 colonne
            const giorni = giorniPerMese[month]; // Giorni nel mese

            for (let giorno = 1; giorno <= totaleCelle; giorno++) {
              // ciclo per ogni giorno e creo box con contenuto

              let compleanniGiorno = compleanni[month].filter(
                (c) => c.day === giorno,
              );
              if (giorno <= giorni) {
                // Giorno <= 31, 30 o 28
                calendario.append(`
                                      <div class="day position-relative">
                                          <div class='day-number position-absolute top-0 end-0 me-2 mt-1'>${giorno}</div>
                                          <div class="day-content d-flex  w-100 h-100 align-items-center justify-content-center">
                                              ${compleanniGiorno.map((c) => `<div class="d-flex flex-column align-items-center mx-2"><span class="celebrated-name">${c.name}</span> <span class="age">${c.eta}</span></div>`).join("⋄")}
                                          </div>
                                      </div>
                                  `);
              } else {
                calendario.append(`
                                      <div class="day empty"></div>
                                  `);
              }
            }

            // Intestazione
            $.each(giorni, function (_, giorno) {
              calendario.append(`<div class="day-name">${giorno}</div>`);
            });
          }
        }

        generaSlide();
        generaGriglia();

        const swiper = new Swiper(".swiper", {
          // Optional parameters
          direction: "horizontal",
          loop: false,

          // If we need pagination
          pagination: {
            el: ".swiper-pagination",
          },

          // Navigation arrows
          navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
          },

          // And if we need scrollbar
          scrollbar: {
            el: ".swiper-scrollbar",
          },
        });
      });
    </script>
  </body>
</html>
